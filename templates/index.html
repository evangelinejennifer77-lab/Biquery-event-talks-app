<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Explorer</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- FontAwesome for beautiful, clean icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Background decorative elements for premium gradient look -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-database database-glowing"></i>
                    <i class="fa-solid fa-share-nodes logo-sub-icon"></i>
                </div>
                <div class="logo-text">
                    <h1>BigQuery</h1>
                    <span class="sub-logo">Release Explorer & Share</span>
                </div>
            </div>
            
            <div class="header-actions">
                <div class="status-indicator">
                    <span class="status-dot online"></span>
                    <span id="status-text">Connected</span>
                </div>
                <button id="btn-refresh" class="btn btn-primary" title="Refresh release notes">
                    <i id="spinner" class="fa-solid fa-arrows-rotate"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <section class="stats-dashboard">
            <div class="stat-card" data-filter="all">
                <div class="stat-icon-wrapper general">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Total Notes</span>
                    <h3 id="stat-total">0</h3>
                </div>
            </div>
            <div class="stat-card" data-filter="feature">
                <div class="stat-icon-wrapper feature">
                    <i class="fa-solid fa-star"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Features</span>
                    <h3 id="stat-features">0</h3>
                </div>
            </div>
            <div class="stat-card" data-filter="change">
                <div class="stat-icon-wrapper change">
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Updates</span>
                    <h3 id="stat-changes">0</h3>
                </div>
            </div>
            <div class="stat-card" data-filter="fix">
                <div class="stat-icon-wrapper fix">
                    <i class="fa-solid fa-bug-slash"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Fixes</span>
                    <h3 id="stat-fixes">0</h3>
                </div>
            </div>
        </section>

        <!-- Controls Section: Search, Filter & Sort -->
        <section class="controls-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Search title, description or code updates...">
                <button id="search-clear" class="btn-clear" style="display: none;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="filter-and-sort">
                <div class="filter-tags">
                    <button class="filter-tag active" data-type="all">All</button>
                    <button class="filter-tag" data-type="feature"><span class="dot dot-feature"></span>Features</button>
                    <button class="filter-tag" data-type="change"><span class="dot dot-change"></span>Changes</button>
                    <button class="filter-tag" data-type="fix"><span class="dot dot-fix"></span>Fixes</button>
                    <button class="filter-tag" data-type="deprecation"><span class="dot dot-deprecation"></span>Deprecations</button>
                </div>
                
                <div class="sort-wrapper">
                    <label for="sort-select">Sort:</label>
                    <select id="sort-select" class="custom-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- No Results Alert -->
            <div id="no-results" class="no-results-card" style="display: none;">
                <div class="no-results-icon">
                    <i class="fa-solid fa-box-open"></i>
                </div>
                <h3>No updates found</h3>
                <p>Try refining your search keyword or switching filters.</p>
            </div>

            <!-- Release Notes List Container -->
            <div id="notes-container" class="notes-grid">
                <!-- Skeleton Loader Cards (shows during loading) -->
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-pill"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line half"></div>
                    <div class="skeleton-footer"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-pill"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line half"></div>
                    <div class="skeleton-footer"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-header">
                        <div class="skeleton-pill"></div>
                        <div class="skeleton-date"></div>
                    </div>
                    <div class="skeleton-title"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line half"></div>
                    <div class="skeleton-footer"></div>
                </div>
            </div>
        </main>
        
        <footer class="app-footer">
            <p>BigQuery Release Notes Explorer &bull; Google Cloud Feeds</p>
        </footer>
    </div>

    <!-- Beautiful Glassmorphic Tweet Composer Modal -->
    <div id="tweet-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-header-title">
                    <i class="fa-brands fa-x-twitter tweet-modal-icon"></i>
                    <h2>Draft and Share Update</h2>
                </div>
                <button id="modal-close" class="modal-btn-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <!-- Select Template Option -->
                <div class="template-selector">
                    <label class="section-label">Select Tweet Style</label>
                    <div class="template-chips">
                        <button class="chip active" data-style="feature">🚀 Announcement</button>
                        <button class="chip" data-style="summary">📝 Quick Summary</button>
                        <button class="chip" data-style="minimal">🔗 Minimalist</button>
                    </div>
                </div>
                
                <!-- Textarea Editor -->
                <div class="editor-container">
                    <label for="tweet-textarea" class="section-label">Customize Tweet</label>
                    <textarea id="tweet-textarea" spellcheck="true" rows="6" maxlength="280"></textarea>
                    
                    <div class="editor-footer">
                        <span id="char-counter" class="char-count">0 / 280</span>
                        <div class="char-progress-bar">
                            <div id="char-progress-fill" class="char-progress-fill"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Original content preview reference -->
                <div class="modal-reference">
                    <div class="reference-title">
                        <i class="fa-solid fa-quote-left"></i>
                        <span>Original Note Reference:</span>
                    </div>
                    <p id="ref-note-title" class="ref-title"></p>
                    <div id="ref-note-body" class="ref-body"></div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button id="btn-copy-tweet" class="btn btn-secondary">
                    <i class="fa-regular fa-clipboard"></i>
                    <span>Copy Text</span>
                </button>
                <button id="btn-post-tweet" class="btn btn-twitter-blue">
                    <i class="fa-brands fa-x-twitter"></i>
                    <span>Post to X / Twitter</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Toast System -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Main JavaScript Application File -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
